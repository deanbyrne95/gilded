<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Gilded — a gem merchant game</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D'http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'%20viewBox%3D'0%200%2064%2064'%3E%3Cdefs%3E%3CradialGradient%20id%3D'c'%20cx%3D'34%25'%20cy%3D'26%25'%20r%3D'80%25'%3E%3Cstop%20offset%3D'0'%20stop-color%3D'%23f8e6a6'%2F%3E%3Cstop%20offset%3D'.45'%20stop-color%3D'%23e6c86a'%2F%3E%3Cstop%20offset%3D'.82'%20stop-color%3D'%23c99b38'%2F%3E%3Cstop%20offset%3D'1'%20stop-color%3D'%239c7328'%2F%3E%3C%2FradialGradient%3E%3C%2Fdefs%3E%3Ccircle%20cx%3D'32'%20cy%3D'32'%20r%3D'30'%20fill%3D'url(%23c)'%20stroke%3D'%238a6620'%20stroke-width%3D'2'%2F%3E%3Ccircle%20cx%3D'32'%20cy%3D'32'%20r%3D'23'%20fill%3D'none'%20stroke%3D'%236f5117'%20stroke-opacity%3D'.55'%20stroke-width%3D'2'%2F%3E%3Cellipse%20cx%3D'23'%20cy%3D'19'%20rx%3D'13'%20ry%3D'8'%20fill%3D'%23ffffff'%20fill-opacity%3D'.28'%2F%3E%3Cpath%20d%3D'M32%2018%2045%2031%2032%2048%2019%2031Z'%20fill%3D'%236f5117'%2F%3E%3Cpath%20d%3D'M19%2031H45%20M32%2018%2026%2031%2032%2048%20M32%2018%2038%2031%2032%2048'%20fill%3D'none'%20stroke%3D'%23f0d789'%20stroke-width%3D'1.3'%20stroke-linejoin%3D'round'%20stroke-linecap%3D'round'%2F%3E%3C%2Fsvg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,600&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="brand">
      <h1>Gilded</h1>
      <span class="sub">A Gem Merchant's Game</span>
    </div>
    <div class="spacer"></div>
    <button class="gbtn theme-toggle" id="themeToggle" data-action="toggle-theme" aria-label="Toggle light or dark theme" aria-pressed="false"></button>
    <nav class="hdr-actions" id="hdrActions" aria-label="Game menu">
      <button class="gbtn ghost" data-action="open-newgame">New game</button>
      <button class="gbtn ghost" data-action="save-game">Save</button>
      <button class="gbtn ghost" id="hdrLoad" data-action="load-game">Load</button>
      <button class="gbtn ghost" data-action="open-settings">Settings</button>
      <button class="gbtn ghost" data-action="open-tutorial">How to play</button>
    </nav>
    <button class="gbtn menu-btn" id="menuBtn" data-action="open-menu" hidden>&#9776; Menu</button>
  </div>

  <div class="goal-banner" id="goalBanner"></div>

  <div class="board">
    <div class="section-label">Patrons</div>
    <div class="nobles" id="nobles"></div>

    <div class="section-label">Development cards</div>
    <div id="tiers"></div>
  </div>
</div>

<!-- Ledger: floating HUD panel, slides in from the right (no overlay) -->
<aside class="ledger-drawer" id="ledgerDrawer">
  <button class="ledger-tab" data-action="toggle-ledger" aria-expanded="false" aria-label="Open or close ledger"><span class="lbl">Ledger</span><span class="chev" aria-hidden="true">&#9662;</span></button>
  <div class="ledger-head">
    <h3>Ledger</h3>
    <button class="ledger-close" data-action="close-ledger" aria-label="Close ledger">&times;</button>
  </div>
  <div class="log" id="log"></div>
</aside>

<!-- Floating player HUD -->
<div class="hud" id="hud">
  <div class="hud-players" id="players"></div>
</div>

<!-- Gem bank + take controls: own centered panel, tucked behind the HUD, shown on your turn -->
<div class="gem-hud" id="gemHud">
  <button class="gem-tab" data-action="toggle-hud" aria-label="Hide or show the bank" title="Hide / show the bank"><span class="lbl">The Bank</span><span class="chev" aria-hidden="true">&#9662;</span></button>
  <div class="hud-controls" id="hudControls"><div class="take-tray" id="takeTray"></div></div>
  <div class="bank" id="bank"></div>
</div>

<div id="fxLayer"></div>
<div id="rtip" class="rtip" hidden></div>

<!-- Tutorial / dialogs -->
<div class="scrim" id="scrim">
  <div class="modal" id="modal"></div>
</div>

<script src="js/constants.js"></script>
<script src="js/game.js"></script>
<script src="js/interactions.js"></script>
<script src="js/ai.js"></script>
<script src="js/render.js"></script>
<script src="js/ui.js"></script>
<script src="js/animations.js"></script>
<script src="js/events.js"></script>
</body>
</html>
