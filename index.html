<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Gilded — a gem merchant game</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,600&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --felt:#17131d; --felt-2:#211a2a; --panel:#271f33; --panel-2:#2f2640;
  --gilt:#c7a24c; --gilt-soft:#e6cd86; --ink:#efe9dc; --ink-dim:#b6ab9a;
  --line:#40354f;
  --white:#e9e4d6; --blue:#3a76d0; --green:#279a63; --red:#d13c57; --black:#3a3546; --gold:#d8b24a;
  --shadow:0 10px 30px rgba(0,0,0,.45);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:
    radial-gradient(1200px 700px at 50% -10%, #2a2033 0%, var(--felt) 55%),
    var(--felt);
  color:var(--ink); font-family:"Jost",system-ui,sans-serif;
  font-variant-numeric:lining-nums; font-feature-settings:"lnum" 1;
  min-height:100vh; -webkit-font-smoothing:antialiased;
}
h1,h2,h3{font-family:"Cormorant Garamond",serif; font-weight:600; margin:0}
button{font-family:"Jost",sans-serif; cursor:pointer}
.wrap{max-width:1180px; margin:0 auto; padding:18px 16px 60px}

/* Topbar */
.topbar{display:flex; align-items:center; gap:16px; flex-wrap:nowrap;
  border-bottom:1px solid var(--line); padding-bottom:14px; margin-bottom:18px}
.brand{display:flex; align-items:baseline; gap:12px}
.brand h1{font-size:34px; letter-spacing:.5px; color:var(--gilt-soft)}
.brand .sub{font-size:12.5px; letter-spacing:3px; text-transform:uppercase; color:var(--ink-dim)}
.topbar .spacer{flex:1}
.hdr-actions{display:flex; align-items:center; gap:8px; flex:0 0 auto}
.hdr-actions .gbtn{flex:0 0 auto; white-space:nowrap}
.theme-toggle{flex:0 0 auto; white-space:nowrap; display:inline-flex; align-items:center; gap:6px}
.hdr-actions[hidden], .menu-btn[hidden]{display:none}
.pill{font-size:12.5px; letter-spacing:1.5px; text-transform:uppercase;
  color:var(--ink-dim); border:1px solid var(--line); border-radius:999px; padding:7px 13px; background:var(--felt-2)}
.pill b{color:var(--gilt-soft)}
.gbtn{background:linear-gradient(180deg,#332942,#271f33); color:var(--ink);
  border:1px solid var(--gilt); border-radius:10px; padding:9px 15px; font-size:14px; letter-spacing:.4px}
.gbtn:hover{border-color:var(--gilt-soft); color:#fff}
.gbtn.ghost{border-color:var(--line)}

/* Layout: full-width board, floating HUD at the bottom */
.wrap{padding-bottom:clamp(104px,20vh,150px)}
.board{min-width:0}

/* Goal banner */
.goal-banner{display:flex; flex-wrap:wrap; align-items:center; gap:10px 16px;
  background:linear-gradient(160deg,var(--panel-2),var(--panel));
  border:1px solid var(--gilt); border-radius:12px; padding:11px 16px; margin-bottom:18px;
  box-shadow:var(--shadow)}
.goal-banner .gb-main{font-family:"Cormorant Garamond",serif; font-size:clamp(17px,4vw,21px);
  color:var(--gilt-soft); line-height:1}
.goal-banner .gb-sep{flex:1}
.goal-banner .gb-tag{font-size:12px; letter-spacing:1.5px; text-transform:uppercase; color:var(--ink-dim)}
.goal-banner .gb-tag b{color:var(--ink)}
.goal-banner .gb-final{color:#e8b04a; font-weight:600; letter-spacing:1px}

/* Bottom player HUD (action bar) */
.hud{position:fixed; left:0; right:0; bottom:0; z-index:44;
  display:flex; flex-wrap:nowrap; align-items:center; gap:8px 16px;
  padding:8px clamp(10px,3vw,18px) calc(8px + env(safe-area-inset-bottom, 0px));
  background:linear-gradient(0deg, rgba(15,11,20,.98), rgba(23,17,30,.92));
  border-top:1px solid var(--gilt); backdrop-filter:blur(6px); max-height:50vh; overflow-y:auto}
.gem-hud{position:fixed; left:50%; bottom:var(--hud-h,58px); z-index:43;
  transform:translate(-50%, calc(100% + 16px)); opacity:0; pointer-events:none;
  max-width:min(96vw,540px);
  display:flex; flex-direction:column; gap:9px;
  padding:9px clamp(12px,3vw,20px) 20px;
  border-radius:16px 16px 0 0; border:1px solid var(--gilt); border-bottom:none;
  background:linear-gradient(0deg, rgba(17,12,22,.985), rgba(30,22,38,.95));
  backdrop-filter:blur(6px); box-shadow:0 -10px 26px rgba(0,0,0,.45);
  transition:transform .42s cubic-bezier(.2,.8,.2,1), opacity .34s ease}
.gem-hud.show{transform:translate(-50%, 12px); opacity:1; pointer-events:auto}
/* collapsed: slide the panel down so only its ledger-style tab shows */
body.gems-hidden .gem-hud.show{transform:translate(-50%, 100%); box-shadow:none}
.gem-tab{position:absolute; top:0; left:50%; transform:translate(-50%,-100%);
  display:flex; align-items:center; gap:7px; padding:5px 16px;
  background:linear-gradient(180deg,#332942,#271f33); color:var(--gilt-soft);
  border:1px solid var(--gilt); border-bottom:none; border-radius:10px 10px 0 0;
  font-family:"Jost"; font-size:11px; letter-spacing:2px; text-transform:uppercase;
  cursor:pointer; box-shadow:var(--shadow); white-space:nowrap}
.gem-tab:hover{color:#fff; border-color:var(--gilt-soft)}
.gem-tab .chev{font-size:10px; line-height:1; transition:transform .28s ease}
body.gems-hidden .gem-tab .chev{transform:rotate(180deg)}
body.light .gem-tab{background:linear-gradient(180deg,#f6efe0,#ece1c9); color:#7d5c21}
.hud-players{flex:1 1 240px; display:flex; align-items:stretch; gap:8px; overflow-x:auto; padding-bottom:2px;
  scrollbar-width:thin; scrollbar-color:var(--line) transparent}
.hud-players::-webkit-scrollbar{height:5px}
.hud-players::-webkit-scrollbar-thumb{background:var(--line); border-radius:99px}
.hud-players.paged{overflow-x:hidden}
.hud-players.single .pchip{flex:1 1 auto; min-width:0}
.pchip-nav{flex:0 0 auto; align-self:stretch; min-width:38px; border-radius:11px; cursor:pointer;
  background:var(--felt-2); border:1px solid var(--line); color:var(--gilt-soft);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; padding:2px 6px}
.pchip-nav:hover{border-color:var(--gilt)}
.pchip-nav .nav-chev{font-size:20px; line-height:1}
.pchip-nav .nav-count{font-family:"Jost"; font-size:10px; letter-spacing:.5px; color:var(--ink-dim); font-variant-numeric:tabular-nums}
.hud-players [hidden]{display:none}
.pchip{flex:0 0 auto; min-width:130px; border-radius:11px; padding:6px 10px;
  background:var(--felt-2); border:1px solid var(--line)}
.pchip.active{border-color:var(--gilt); animation:breathe 2.6s ease-in-out infinite}
.pchip .pc-top{display:flex; align-items:baseline; gap:8px}
.pchip .pc-name{font-family:"Cormorant Garamond",serif; font-size:16px}
.pchip .pc-think{display:inline-flex; align-items:center; gap:3px; align-self:center}
.pchip .pc-first{align-self:center; font-family:"Jost"; font-size:9px; font-weight:600; letter-spacing:.5px;
  text-transform:uppercase; color:var(--gilt-soft); border:1px solid var(--gilt); border-radius:6px;
  padding:1px 5px; line-height:1.4}
.pchip .pc-think i{width:4px; height:4px; border-radius:50%; background:var(--gilt-soft);
  opacity:.35; animation:thinkPulse 1.1s ease-in-out infinite}
.pchip .pc-think i:nth-child(2){animation-delay:.18s}
.pchip .pc-think i:nth-child(3){animation-delay:.36s}
@keyframes thinkPulse{0%,80%,100%{opacity:.28; transform:translateY(0)} 40%{opacity:1; transform:translateY(-2px)}}
.pchip .pc-vp{margin-left:auto; font-family:"Cormorant Garamond",serif; font-size:18px; color:var(--gilt-soft)}
.pchip .pc-vp small{font-family:"Jost"; font-size:9px; letter-spacing:1px; color:var(--ink-dim)}
.pchip .pc-pat{font-family:"Jost"; font-weight:500; font-size:12px; color:var(--ink-dim); margin-right:9px}
.pchip .pc-pat .pc-ico{vertical-align:-0.14em; margin-right:2px}
/* combined holdings: card count sits inside the colour, gem count beside it */
.pchip .pc-hold{display:flex; flex-wrap:wrap; align-items:center; gap:4px 8px; margin-top:5px; font-size:11px; color:var(--ink-dim)}
.pchip .cg{display:inline-flex; align-items:center; gap:3px}
.pchip .cg .bon{width:17px; height:17px; border-radius:5px; border:1px solid rgba(0,0,0,.4);
  display:inline-flex; align-items:center; justify-content:center; font-size:10px; font-weight:700;
  line-height:1; color:#fff; text-shadow:0 1px 1px rgba(0,0,0,.55)}
.pchip .cg .bon.g-white, .pchip .cg .bon.g-gold{color:#241d2b; text-shadow:0 1px 0 rgba(255,255,255,.4)}
.pchip .cg .gem{width:15px; height:15px; filter:drop-shadow(0 1px 1px rgba(0,0,0,.35))}
.pchip .cg .tk{color:var(--ink); font-variant-numeric:tabular-nums}
.pchip .cg .tk.tk0{color:var(--ink-dim); opacity:.45}
.pchip .cg .tk-add{color:#7fd39a; font-weight:700}
.pchip .pc-ico{width:13px; height:13px; opacity:.9}
/* opponents' reserved cards: face-up ones are public, deck-holds show as a back */
.pchip .pc-res{display:flex; gap:4px; margin-top:6px}
.pchip .rcard{width:15px; height:21px; border-radius:3px; border:1px solid rgba(0,0,0,.45);
  display:inline-flex; align-items:flex-start; justify-content:flex-start; padding:1px 0 0 2px;
  font-size:9px; font-weight:700; line-height:1; color:#fff;
  text-shadow:0 1px 1px rgba(0,0,0,.6); box-shadow:0 1px 2px rgba(0,0,0,.3)}
.pchip .rcard.g-white{color:#241d2b; text-shadow:0 1px 0 rgba(255,255,255,.4)}
.pchip .rcard.back{align-items:center; justify-content:center; padding:0;
  background:repeating-linear-gradient(45deg,#2c2338,#2c2338 3px,#221b2e 3px,#221b2e 6px); border-color:var(--line)}
.pchip .rcard.back::after{content:"\2666"; color:var(--gilt-soft); font-size:9px}
.pchip.you .pc-res .rcard{cursor:pointer; width:18px; height:25px; font-size:10px; transition:transform .12s ease, box-shadow .12s ease}
.pchip.you .pc-res .rcard:hover{transform:translateY(-2px); box-shadow:0 3px 8px rgba(0,0,0,.45)}
.pchip .rcard.sel{outline:2px solid var(--gilt-soft); outline-offset:1px}
.pchip.you .pc-res .rcard.buyable{border-color:#6fae7e}
/* rich hover tooltip for reserved cards */
.rtip{position:fixed; z-index:80; pointer-events:none; min-width:118px; max-width:180px;
  background:linear-gradient(180deg,#241d2b,#1a1422); border:1px solid var(--gilt);
  border-radius:10px; padding:8px 10px; box-shadow:0 10px 26px rgba(0,0,0,.55);
  color:var(--ink); font-size:12px; line-height:1.3}
.rtip[hidden]{display:none}
.rtip-head{display:flex; align-items:center; gap:6px; margin-bottom:4px}
.rtip-swatch{width:14px; height:19px; border-radius:3px; border:1px solid rgba(0,0,0,.5); flex:none}
.rtip-name{font-weight:700}
.rtip-pts{margin-left:auto; color:var(--gilt-soft); font-weight:700; white-space:nowrap}
.rtip-pts small{font-weight:400; color:var(--ink-dim)}
.rtip-tier{color:var(--ink-dim); font-size:11px; margin-bottom:6px}
.rtip-cost-lbl{font-size:10px; letter-spacing:.06em; text-transform:uppercase; color:var(--ink-dim); margin-bottom:3px}
.rtip-cost{display:flex; gap:4px; flex-wrap:wrap}
.rtip-cost .dot{width:18px; height:18px}
.rtip-free{color:var(--ink-dim); font-style:italic}
.rtip-ready{margin-top:6px; color:#6fae7e; font-weight:700; font-size:11px}
.gem-hud .res-cost{display:inline-flex; align-items:center; gap:4px}
.gem-hud .res-cost .dot{width:19px; height:19px}
/* gems live in their own centered floating panel behind the bar */
.gem-hud .bank{margin:0; gap:clamp(8px,2vw,14px); flex-wrap:nowrap; justify-content:center; overflow:visible; padding:4px 2px 2px}
.gem-hud .token{width:auto; gap:1px}
.gem-hud .token .gem{width:clamp(26px,6.4vw,34px); height:clamp(26px,6.4vw,34px)}
.gem-hud .token .cnt{font-size:10.5px}
.gem-hud .token .lbl{display:none}
/* take controls sit atop the gem panel, spanning its full width */
.gem-hud .hud-controls{width:100%; display:flex}
.gem-hud .hud-controls.hidden{display:none}
.gem-hud .take-tray{margin:0; padding:0; border:none; background:none;
  display:flex; align-items:center; gap:8px; width:100%; flex-wrap:wrap}
.gem-hud .take-tray .gbtn{flex:1 1 0; min-width:78px; padding:8px 12px; font-size:13px}
.gem-hud .take-tray .take-note{flex:1 1 auto; font-size:11.5px; color:var(--gilt-soft)}
.gem-hud .take-tray .take-chips{display:flex; gap:5px; flex-wrap:wrap; justify-content:flex-start}
.gem-hud .take-tray .take-chips .gem{width:20px; height:20px}
.gbtn:disabled{opacity:.4; cursor:not-allowed}

.section-label{font-size:11px; letter-spacing:3px; text-transform:uppercase; color:var(--ink-dim); margin:2px 0 10px}

/* Nobles */
.nobles{display:flex; gap:10px; flex-wrap:wrap; margin-bottom:16px}
.noble{width:clamp(86px,21vw,110px); min-height:clamp(70px,17vw,92px);
  border-radius:12px; position:relative;
  background:linear-gradient(160deg,#40354f,#2a2135); border:1px solid var(--gilt);
  box-shadow:var(--shadow); padding:9px 10px; display:flex; flex-direction:column;
  justify-content:space-between; gap:8px}
.noble .np{font-family:"Cormorant Garamond",serif; font-size:clamp(20px,5vw,24px);
  line-height:1; color:var(--gilt-soft)}
.noble .np small{font-family:"Jost"; font-size:9px; letter-spacing:1.5px;
  text-transform:uppercase; color:var(--ink-dim); margin-left:4px}
.noble .req{display:flex; gap:6px; flex-wrap:wrap; align-items:center}
.reqchip{display:flex; align-items:center; gap:4px; font-size:clamp(12px,3.2vw,14px);
  color:var(--ink); font-weight:500}
.dot{width:clamp(16px,4.4vw,20px); height:clamp(16px,4.4vw,20px); border-radius:5px;
  display:inline-flex; align-items:center; justify-content:center; border:1px solid rgba(0,0,0,.35)}

/* Tiers + cards */
.tier-row{display:flex; align-items:center; gap:12px; margin-bottom:14px; container-type:inline-size}
.deck{width:112px; height:150px; border-radius:12px; flex:none; container-type:inline-size;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:clamp(1px,3cqi,4px);
  color:var(--gilt-soft); position:relative;
  border:1px solid var(--gilt); box-shadow:var(--shadow); cursor:pointer; padding:6px 2px}
.deck .dnum{font-family:"Cormorant Garamond",serif; line-height:1; font-size:clamp(15px,42cqi,28px)}
.deck .dlabel{font-family:"Jost"; font-size:clamp(6px,11cqi,9px); letter-spacing:1px;
  text-transform:uppercase; color:rgba(255,255,255,.5); line-height:1}
.deck .dleft{font-family:"Jost"; font-size:clamp(7px,13cqi,10px); letter-spacing:.5px;
  color:rgba(255,255,255,.62); line-height:1}
.deck.t1{background:linear-gradient(160deg,#20402f,#16281f)}
.deck.t2{background:linear-gradient(160deg,#3a2f16,#241c0f)}
.deck.t3{background:linear-gradient(160deg,#3a1622,#241017)}
.deck:hover{border-color:var(--gilt-soft)}
.deck.sel{border-color:var(--gilt-soft); box-shadow:0 0 0 2px var(--gilt-soft), var(--shadow)}
.deck.sel .dleft{visibility:hidden}
.deck-menu{position:absolute; inset:auto 4px 4px 4px; display:flex}
.deck-menu .mbtn{flex:1; font-size:clamp(8px,22cqi,12px); padding:clamp(3px,6cqi,6px) 0}
.cards{display:flex; gap:12px; flex-wrap:wrap}
.card{width:112px; height:150px; border-radius:12px; position:relative;
  background:linear-gradient(165deg,#2c2438,#211a2b); border:1px solid var(--line);
  box-shadow:var(--shadow); transition:transform .12s, border-color .12s; cursor:pointer;
  display:flex; flex-direction:column}
.card:hover{transform:translateY(-3px); border-color:var(--gilt)}
.card.empty{background:rgba(255,255,255,.02); border:1px dashed var(--line); box-shadow:none; cursor:default}
.card.empty:hover{transform:none; border-color:var(--line)}
.card.sel{border-color:var(--gilt-soft); box-shadow:0 0 0 2px var(--gilt-soft), var(--shadow)}
.card.afford{border-color:#6fae7e}
.card-band{flex:0 0 38%; position:relative; display:flex; justify-content:flex-end;
  align-items:flex-start; padding:7px 8px; border-radius:11px 11px 0 0;
  box-shadow:inset 0 -10px 14px rgba(0,0,0,.16); border-bottom:1px solid rgba(255,255,255,.12)}
.card-pts{font-family:"Cormorant Garamond",serif; font-weight:700; line-height:1;
  font-size:clamp(15px,26cqi,26px); color:var(--gilt-soft);
  font-variant-numeric:lining-nums tabular-nums; font-feature-settings:"lnum" 1,"tnum" 1;
  background:rgba(20,15,26,.82); border-radius:8px; padding:2px 6px;
  min-width:1.5em; display:inline-flex; align-items:center; justify-content:center; text-align:center}
.card-body{flex:1 1 auto; display:flex; flex-direction:column; justify-content:center;
  gap:clamp(3px,4cqi,6px); padding:clamp(6px,7cqi,10px)}
.card .cost{display:grid; grid-template-columns:repeat(2,max-content); gap:clamp(3px,4cqi,6px); align-content:flex-start; justify-content:flex-start}
.card .menu{position:absolute; inset:auto 6px 6px 6px; display:flex; gap:6px}
.mbtn{flex:1; border:none; border-radius:7px; padding:6px 0; font-size:12px; letter-spacing:.5px; color:#1a1420}
.mbtn.buy{background:linear-gradient(180deg,#7fd39a,#4fae72)}
.mbtn.buy:disabled{background:#3a4440; color:#7d8580; cursor:not-allowed}
.mbtn.res{background:linear-gradient(180deg,#e6cd86,#c7a24c)}
.mbtn.res:disabled{background:#443a2a; color:#8b7f66; cursor:not-allowed}

/* gem token faces — a distinct silhouette per gem type */
.gem{position:relative; border-radius:50%;
  background:
    radial-gradient(circle at 32% 26%, rgba(255,255,255,.9), rgba(255,255,255,0) 46%),
    radial-gradient(circle at 70% 82%, rgba(0,0,0,.32), rgba(0,0,0,0) 55%);
  filter:drop-shadow(0 3px 5px rgba(0,0,0,.45))}
.g-white{background-color:var(--white)} .g-blue{background-color:var(--blue)}
.g-green{background-color:var(--green)} .g-red{background-color:var(--red)}
.g-black{background-color:var(--black)} .g-gold{background-color:var(--gold)}
/* shapes apply only to gem tokens, never to the card colour band or cost dots */
.gem.g-white{clip-path:polygon(50% 1%,88% 34%,50% 99%,12% 34%)}                         /* diamond */
.gem.g-green{clip-path:polygon(28% 5%,72% 5%,95% 30%,95% 70%,72% 95%,28% 95%,5% 70%,5% 30%)} /* emerald cut */
.gem.g-black{clip-path:polygon(25% 5%,75% 5%,100% 50%,75% 95%,25% 95%,0 50%)}           /* onyx hexagon */
.gem.g-blue{border-radius:50%}                                                          /* sapphire round */
.gem.g-red{border-radius:34%}                                                           /* ruby cushion */
.gem.g-gold{border-radius:50%}                                                          /* gold coin */
.gem.g-gold::after{content:""; position:absolute; inset:20%; border-radius:50%; border:2px solid rgba(90,66,20,.5)}

/* Bank */
.bank{display:flex; gap:clamp(12px,3.4vw,18px); flex-wrap:wrap; margin:6px 0 8px}
.token{flex:0 0 auto}
.token{width:66px; display:flex; flex-direction:column; align-items:center; gap:5px}
.token .gem{width:52px;height:52px; cursor:pointer}
.token .gem.disabled{opacity:.32; cursor:not-allowed}
.token .cnt{font-size:13px; color:var(--ink-dim)}
.token .cnt b{color:var(--ink)}
.token .lbl{font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:var(--ink-dim)}
.take-tray{display:flex; align-items:center; gap:12px; flex-wrap:wrap;
  background:var(--felt-2); border:1px solid var(--line); border-radius:12px; padding:12px 14px; margin-top:6px}
.take-chips{display:flex; gap:6px}
.take-chips .gem{width:30px;height:30px}
.take-empty{color:var(--ink-dim); font-size:14px}

/* Right column */
.rail{display:flex; flex-direction:column; gap:16px}
.status{background:linear-gradient(160deg,var(--panel-2),var(--panel));
  border:1px solid var(--gilt); border-radius:14px; padding:14px 15px; box-shadow:var(--shadow)}
.status .who{font-family:"Cormorant Garamond",serif; font-size:22px; color:var(--gilt-soft)}
.status .msg{font-size:14px; color:var(--ink-dim); margin-top:4px; min-height:20px}
.panel{background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:13px 14px}
.pl{border-radius:12px; padding:11px 12px; margin-bottom:10px; border:1px solid var(--line); background:var(--felt-2)}
.pl:last-child{margin-bottom:0}
.pl.active{border-color:var(--gilt); box-shadow:0 0 0 1px var(--gilt) inset}
.pl .row1{display:flex; align-items:center; justify-content:space-between}
.pl .nm{font-family:"Cormorant Garamond",serif; font-size:20px}
.pl .vp{font-family:"Cormorant Garamond",serif; font-size:22px; color:var(--gilt-soft)}
.pl .vp small{font-family:"Jost"; font-size:10px; letter-spacing:1.5px; color:var(--ink-dim)}
.pl .mini{display:flex; gap:8px; flex-wrap:wrap; margin-top:8px}
.stack{display:flex; align-items:center; gap:3px; font-size:12.5px}
.stack .gem{width:16px;height:16px}
.stack .bon{width:16px;height:16px;border-radius:4px;border:1px solid rgba(0,0,0,.4)}
.pl .resv{margin-top:7px; font-size:12px; color:var(--ink-dim)}
.log{max-height:190px; overflow:auto; font-size:12.5px; line-height:1.5; color:var(--ink-dim)}
.log div{padding:2px 0; border-bottom:1px dashed rgba(255,255,255,.05)}
.log b{color:var(--ink)}
.log .fin{color:#e8b04a; font-weight:600; letter-spacing:.3px}
.log .fin b{color:#ffdf8e}

/* Modal */
.scrim{position:fixed; inset:0; background:rgba(8,5,12,.72); backdrop-filter:blur(3px);
  display:none; align-items:center; justify-content:center; padding:20px; z-index:50}
.scrim.show{display:flex}
.modal{max-width:640px; width:100%; max-height:86vh; overflow:auto;
  background:linear-gradient(170deg,#2b2338,#211a2b); border:1px solid var(--gilt);
  border-radius:18px; box-shadow:var(--shadow); padding:26px 28px}
.modal h2{font-size:30px; color:var(--gilt-soft); margin-bottom:4px}
.modal .eyebrow{font-size:11px; letter-spacing:3px; text-transform:uppercase; color:var(--ink-dim)}
.modal h3{font-size:20px; color:var(--ink); margin:18px 0 4px}
.modal p{font-size:14.5px; line-height:1.6; color:var(--ink-dim); margin:6px 0}
.modal .inline-gem{display:inline-block; width:13px;height:13px;border-radius:3px; vertical-align:-1px; border:1px solid rgba(0,0,0,.4)}
.modal ul{margin:6px 0; padding-left:18px}
.modal li{font-size:14.5px; line-height:1.6; color:var(--ink-dim); margin:3px 0}
.modal .foot{display:flex; gap:10px; justify-content:flex-end; margin-top:22px}
.choices{display:flex; gap:14px; justify-content:center; margin:18px 0 6px}
.choice{border:1px solid var(--line); background:var(--felt-2); border-radius:12px;
  padding:16px 20px; text-align:center; cursor:pointer; min-width:88px}
.choice:hover{border-color:var(--gilt)}
.choice.sel{border-color:var(--gilt); box-shadow:0 0 0 1px var(--gilt) inset}
.choice .n{font-family:"Cormorant Garamond",serif; font-size:34px; color:var(--gilt-soft)}
.choice .c{font-size:12px; letter-spacing:1px; color:var(--ink-dim)}
.mode-cards{display:flex; gap:12px; margin:18px 0 8px; flex-wrap:wrap}
.mode-card{flex:1 1 0; min-width:148px; text-align:left; background:var(--felt-2);
  border:1px solid var(--line); border-radius:12px; padding:13px 15px; cursor:pointer;
  display:flex; flex-direction:column; gap:3px; font-family:"Jost"}
.mode-card:hover:not(.disabled){border-color:var(--gilt)}
.mode-card.sel{border-color:var(--gilt); box-shadow:0 0 0 1px var(--gilt) inset}
.mode-card .mc-t{font-family:"Cormorant Garamond",serif; font-size:21px; color:var(--gilt-soft)}
.mode-card .mc-s{font-size:12px; letter-spacing:.3px; color:var(--ink-dim)}
.mode-card.disabled{opacity:.45; cursor:not-allowed}
.win-name{font-family:"Cormorant Garamond",serif; font-size:38px; color:var(--gilt-soft); text-align:center; margin:6px 0}
.hidden{display:none !important}

/* ---------- animations ---------- */
#fxLayer{position:fixed; inset:0; pointer-events:none; z-index:60; overflow:hidden}
.fly-gem{position:fixed; width:26px; height:26px; border-radius:50%;
  box-shadow:inset 0 0 0 2px rgba(255,255,255,.18), 0 4px 12px rgba(0,0,0,.5);
  border:1px solid rgba(0,0,0,.4);
  transition:transform .6s cubic-bezier(.35,.05,.2,1), opacity .6s ease;
  will-change:transform,opacity}
.float-txt{position:fixed; font-family:"Cormorant Garamond",serif; font-weight:700;
  font-size:26px; color:var(--gilt-soft); text-shadow:0 2px 10px rgba(0,0,0,.65);
  transition:transform 1s cubic-bezier(.2,.6,.2,1), opacity 1s ease;
  will-change:transform,opacity; white-space:nowrap}
.fx-ring{position:fixed; width:40px; height:40px; border-radius:50%;
  border:2px solid var(--gilt-soft);
  transition:transform .7s ease-out, opacity .7s ease-out; will-change:transform,opacity}
.fly-card{position:fixed; z-index:61; margin:0; pointer-events:none; border-radius:12px;
  transition:transform .58s cubic-bezier(.4,.05,.2,1), opacity .58s ease;
  transform-origin:center; will-change:transform,opacity; box-shadow:0 16px 34px rgba(0,0,0,.55)}
.confetti{position:fixed; top:-24px; width:12px; height:12px; border-radius:3px; border:1px solid rgba(0,0,0,.35)}
@keyframes dealIn{ from{opacity:0; transform:translateY(-10px) scale(.96)} to{opacity:1; transform:none} }
.card-enter{ animation:dealIn .42s cubic-bezier(.3,.7,.2,1) both }
@keyframes breathe{ 0%,100%{box-shadow:0 0 0 1px var(--gilt) inset}
  50%{box-shadow:0 0 0 1px var(--gilt) inset, 0 0 16px rgba(199,162,76,.5)} }
.pl.active{ animation:breathe 2.6s ease-in-out infinite }
@keyframes conffall{ to{ transform:translateY(105vh) rotate(var(--spin)); opacity:.15 } }
.token .gem{ transition:transform .18s ease, filter .18s ease }
.token .gem:not(.disabled):hover{ transform:translateY(-3px); filter:brightness(1.12) }
/* ---------- responsive / fluid sizing ---------- */
html,body{overflow-x:hidden}
.wrap{padding:clamp(12px,3vw,18px) clamp(10px,3vw,16px) 60px}
.brand h1{font-size:clamp(26px,6vw,34px)}
.brand .sub{font-size:clamp(10px,2.4vw,12.5px)}
.token{width:clamp(46px,12vw,66px)}
.token .gem{width:clamp(36px,9.5vw,52px); height:clamp(36px,9.5vw,52px)}
.tier-row{gap:clamp(8px,1.6vw,24px)}
.deck{flex:0 0 auto; width:clamp(92px,46cqi,112px); height:auto; aspect-ratio:112/150}
.cards{flex:1 1 auto; flex-wrap:wrap; min-width:0; gap:clamp(8px,1.6vw,24px); align-content:flex-start; container-type:inline-size}
.card{flex:0 0 auto; width:clamp(92px,46cqi,112px); height:auto; aspect-ratio:112/150; container-type:inline-size}
.modal{padding:clamp(18px,5vw,28px)}
.modal h2{font-size:clamp(24px,6vw,30px)}

/* card internals scale with the card; cost blocks carry the count inside */
.card .cost .dot{width:clamp(17px,24cqi,22px); height:clamp(17px,24cqi,22px)}
.card .cost .dv{font-size:clamp(9px,15cqi,13px)}

/* small screens: same layout, just tighter spacing and type */
@media (max-width:640px){
  .topbar{gap:10px; padding-bottom:10px}
  .brand .sub{display:none}
  .nobles{gap:6px}
  .take-tray{padding:10px 12px}
  .panel{padding:11px 10px}
  .status{padding:11px 12px}
  .status .who{font-size:19px}
  .pl{padding:9px 10px}
  .pl .nm{font-size:16px}
  .pl .vp{font-size:18px}
  .pl .mini{gap:5px; margin-top:6px}
  .pl .resv{margin-top:6px; font-size:11px}
  .section-label{letter-spacing:2px}
  /* HUD on phones: gems + buttons stay inline on one row, players scroll on their own row below */
  .hud{gap:6px 10px; padding:6px 10px calc(6px + env(safe-area-inset-bottom, 0px)); flex-wrap:wrap; max-height:48vh}
  .hud-players{flex:1 1 100%; margin-top:2px}
  .gem-hud .token .gem{width:clamp(22px,6.6vw,30px); height:clamp(22px,6.6vw,30px)}
  .pchip{min-width:116px; padding:5px 9px}
  .pchip .pc-name{font-size:15px}
  .pchip .pc-vp{font-size:16px}
}

@media (prefers-reduced-motion: reduce){
  .card-enter{animation:none}
  .pl.active{animation:none}
  .fly-gem,.float-txt,.fx-ring,.fly-card{transition:none}
  .gem-hud{transition:opacity .01s}
  .gem-tab .chev,.ledger-tab .chev{transition:none}
  .pchip.active{animation:none}
  .pc-think i{animation:none; opacity:.7}
  .token .gem{transition:none}
}
/* footer */
.footer{display:flex; justify-content:center; gap:12px; margin-top:26px; padding-top:18px; border-top:1px solid var(--line)}

/* ledger slide-in drawer */
.ledger-tab{position:absolute; left:0; top:50%; transform:translate(-100%,-50%);
  display:flex; flex-direction:column; align-items:center; gap:7px;
  background:linear-gradient(180deg,#332942,#271f33); color:var(--gilt-soft);
  border:1px solid var(--gilt); border-right:none; border-radius:10px 0 0 10px;
  padding:14px 7px; font-size:11px; letter-spacing:2px; text-transform:uppercase;
  cursor:pointer; box-shadow:var(--shadow)}
.ledger-tab .lbl{writing-mode:vertical-rl; text-orientation:mixed; transform:rotate(180deg)}
.ledger-tab .chev{font-size:10px; line-height:1; transition:transform .28s ease}
body.ledger-open .ledger-tab .chev{transform:rotate(180deg)}
.ledger-tab:hover{color:#fff; border-color:var(--gilt-soft)}
.ledger-drawer{position:fixed; right:0; top:0; bottom:0; z-index:47;
  width:min(340px,86vw);
  transform:translateX(100%);
  background:linear-gradient(180deg, rgba(30,23,40,.985), rgba(23,17,30,.95));
  backdrop-filter:blur(6px);
  border:1px solid var(--gilt); border-right:none; border-radius:16px 0 0 16px;
  box-shadow:none; padding:16px 18px 18px;
  transition:transform .42s cubic-bezier(.2,.8,.2,1), box-shadow .42s ease;
  display:flex; flex-direction:column}
.ledger-drawer.open{transform:translateX(0); box-shadow:-12px 0 40px rgba(0,0,0,.5)}
.ledger-head{display:flex; align-items:center; justify-content:space-between;
  margin-bottom:12px; border-bottom:1px solid var(--line); padding-bottom:10px}
.ledger-head h3{font-size:24px; color:var(--gilt-soft)}
.ledger-close{background:none; border:none; color:var(--ink-dim); font-size:30px;
  line-height:1; cursor:pointer; padding:0 4px}
.ledger-close:hover{color:var(--ink)}
.ledger-drawer .log{max-height:none; flex:1; overflow:auto}
@media (prefers-reduced-motion: reduce){
  .ledger-drawer{transition:none}
}
/* menu + settings */
.menu-list{display:flex; flex-direction:column; gap:8px; margin:16px 0 4px}
.menu-item{text-align:left; background:var(--felt-2); border:1px solid var(--line);
  color:var(--ink); border-radius:10px; padding:13px 15px; font-size:15px; font-family:"Jost"; cursor:pointer}
.menu-item:hover:not(:disabled){border-color:var(--gilt)}
.menu-item:disabled{opacity:.5; cursor:not-allowed}
.set-row{display:flex; align-items:center; justify-content:space-between; gap:14px;
  padding:13px 0; border-bottom:1px solid var(--line)}
.set-label{font-size:15px; color:var(--ink); display:flex; flex-direction:column}
.set-hint{font-size:11px; color:var(--ink-dim); margin-top:2px}
.seg-group{display:flex; gap:6px; flex:0 1 auto; flex-wrap:wrap; justify-content:flex-end}
.seg{background:var(--felt-2); border:1px solid var(--line); color:var(--ink-dim);
  border-radius:8px; padding:8px 13px; font-size:14px; cursor:pointer; font-family:"Jost"}
.seg.on{border-color:var(--gilt); color:var(--gilt-soft); background:var(--panel-2)}
.set-note{font-size:12px; color:var(--ink-dim); margin-top:16px}

/* colour-vision modes: remap gem hues so blue / green / red stay distinguishable
   (white stays light, black stays dark, so they separate by luminance).
   Palettes verified with a Machado-2009 CVD simulation + CIEDE2000: every token
   pair stays >=21 ΔE for protan/deutan and >=20 ΔE for tritan.
   Protan/deutan share Paul Tol's "vibrant" red-green-safe set; tritan is tuned
   separately for the blue-yellow axis. Applies over both dark and light themes. */
body.cvd-prot{ --blue:#0077BB; --green:#009988; --red:#CC3311; --gold:#F0E442; }
body.cvd-deut{ --blue:#0077BB; --green:#009988; --red:#CC3311; --gold:#F0E442; }
body.cvd-trit{ --blue:#3b3bdb; --green:#2a9d3a; --red:#d6334c; --gold:#cfae2b; }

/* cost / patron requirement blocks: the count sits inside the colour square */
.dot .dv{font-family:"Jost"; font-weight:700; line-height:1; color:#fff;
  text-shadow:0 0 2px #000,0 0 2px #000; font-size:clamp(9px,2.6vw,12px)}

/* light theme */
body.light{
  --felt:#dccdaa; --felt-2:#f6efe0; --panel:#fbf6ea; --panel-2:#f0e8d6;
  --gilt:#9c7629; --gilt-soft:#7d5c21; --ink:#241d29; --ink-dim:#5c5042; --line:#c6b384;
  --shadow:0 10px 26px rgba(70,50,12,.22);
  background:radial-gradient(1200px 700px at 50% -10%, #efe6ce 0%, var(--felt) 58%), var(--felt);
}
body.light .gbtn{background:linear-gradient(180deg,#f6efe0,#ece1c9); color:#4a3a22}
body.light .gbtn:hover{color:#2c2216; border-color:var(--gilt-soft)}
body.light .card{background:linear-gradient(165deg,#fbf6ea,#efe5d2)}
body.light .card-band.g-white{background:#ded7c4}
body.light .card-band{border-bottom-color:rgba(0,0,0,.14)}
body.light .card-pts{color:#e9c96a; background:rgba(28,20,34,.9)}
body.light .deck.t1{background:linear-gradient(160deg,#66b28c,#509f78)}
body.light .deck.t2{background:linear-gradient(160deg,#bc9b4e,#a6873f)}
body.light .deck.t3{background:linear-gradient(160deg,#bc4e72,#a63f62)}
body.light .deck .dnum{color:#f4e6b8}
body.light .deck .dlabel{color:rgba(255,255,255,.72)}
body.light .deck .dleft{color:rgba(255,255,255,.82)}
body.light .noble{background:linear-gradient(160deg,#f4ecdd,#e8dec8)}
body.light .hud{background:linear-gradient(0deg,#f1e9d7,#f8f2e5)}
body.light .modal{background:linear-gradient(170deg,#fbf6ea,#f1e9d7)}
body.light .ledger-drawer{background:linear-gradient(180deg,#fbf6ea,#eee5d3)}
body.light .gem-hud{background:linear-gradient(0deg,#e7dabc,#f1e8d4)}
body.light .gem{filter:drop-shadow(0 0 1px rgba(58,42,10,.55)) drop-shadow(0 2px 4px rgba(58,42,10,.26))}
body.light .pchip .cg .gem{filter:drop-shadow(0 0 .6px rgba(58,42,10,.5)) drop-shadow(0 1px 1px rgba(58,42,10,.3))}
body.light .ledger-tab{background:linear-gradient(180deg,#f6efe0,#ece1c9); color:#7d5c21}
body.light .ledger-tab:hover, body.light .gem-tab:hover{color:#4a3a22}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="brand">
      <h1>Gilded</h1>
      <span class="sub">A Gem Merchant's Game</span>
    </div>
    <div class="spacer"></div>
    <button class="gbtn theme-toggle" id="themeToggle" data-action="toggle-theme" aria-label="Toggle light or dark theme" aria-pressed="false"></button>
    <nav class="hdr-actions" id="hdrActions" aria-label="Game menu">
      <button class="gbtn ghost" data-action="open-newgame">New game</button>
      <button class="gbtn ghost" data-action="save-game">Save</button>
      <button class="gbtn ghost" id="hdrLoad" data-action="load-game">Load</button>
      <button class="gbtn ghost" data-action="open-settings">Settings</button>
      <button class="gbtn ghost" data-action="open-tutorial">How to play</button>
    </nav>
    <button class="gbtn menu-btn" id="menuBtn" data-action="open-menu" hidden>&#9776; Menu</button>
  </div>

  <div class="goal-banner" id="goalBanner"></div>

  <div class="board">
    <div class="section-label">Patrons</div>
    <div class="nobles" id="nobles"></div>

    <div class="section-label">Development cards</div>
    <div id="tiers"></div>
  </div>
</div>

<!-- Ledger: floating HUD panel, slides in from the right (no overlay) -->
<aside class="ledger-drawer" id="ledgerDrawer">
  <button class="ledger-tab" data-action="toggle-ledger" aria-expanded="false" aria-label="Open or close ledger"><span class="lbl">Ledger</span><span class="chev" aria-hidden="true">&#9662;</span></button>
  <div class="ledger-head">
    <h3>Ledger</h3>
    <button class="ledger-close" data-action="close-ledger" aria-label="Close ledger">&times;</button>
  </div>
  <div class="log" id="log"></div>
</aside>

<!-- Floating player HUD -->
<div class="hud" id="hud">
  <div class="hud-players" id="players"></div>
</div>

<!-- Gem bank + take controls: own centered panel, tucked behind the HUD, shown on your turn -->
<div class="gem-hud" id="gemHud">
  <button class="gem-tab" data-action="toggle-hud" aria-label="Hide or show the bank" title="Hide / show the bank"><span class="lbl">The Bank</span><span class="chev" aria-hidden="true">&#9662;</span></button>
  <div class="hud-controls" id="hudControls"><div class="take-tray" id="takeTray"></div></div>
  <div class="bank" id="bank"></div>
</div>

<div id="fxLayer"></div>
<div id="rtip" class="rtip" hidden></div>

<!-- Tutorial / dialogs -->
<div class="scrim" id="scrim">
  <div class="modal" id="modal"></div>
</div>

<script>
"use strict";

/* ---------- constants & data ---------- */
const KEYS = ["white","blue","green","red","black"];       // gem colours (indexes 0..4)
const ALL  = ["white","blue","green","red","black","gold"];
const NAME = {white:"Diamond",blue:"Sapphire",green:"Emerald",red:"Ruby",black:"Onyx",gold:"Gold"};
let WIN = 15;
const GLET = {white:"D",blue:"S",green:"E",red:"R",black:"O",gold:"G"};
const ROMAN = {1:"I",2:"II",3:"III"};
function costText(pay){ return ALL.filter(k=>pay[k]).map(k=>`<b>${pay[k]}</b> ${NAME[k]}`).join(", "); }

// cost patterns. index 0 of `c` is the card's OWN colour; the rest rotate through the others.
const PAT = {
  1:[ {p:0,c:[0,1,1,1,1]},{p:0,c:[0,2,0,2,0]},{p:0,c:[0,0,3,0,0]},{p:0,c:[0,2,2,0,1]},
      {p:0,c:[0,0,1,2,2]},{p:0,c:[3,1,0,0,1]},{p:0,c:[0,0,2,1,0]},{p:1,c:[0,4,0,0,0]} ],
  2:[ {p:1,c:[0,0,3,2,2]},{p:1,c:[0,3,0,3,0]},{p:2,c:[0,0,0,5,0]},
      {p:2,c:[5,3,0,0,0]},{p:3,c:[6,0,0,0,0]},{p:1,c:[0,2,2,3,0]} ],
  3:[ {p:3,c:[0,3,3,5,3]},{p:4,c:[0,0,0,7,3]},{p:4,c:[0,6,3,3,0]},{p:5,c:[0,0,0,7,0]} ],
};
const NOBLE_REQS = [
  {0:4,1:4},{1:4,2:4},{2:4,3:4},{3:4,4:4},{4:4,0:4},
  {0:3,1:3,2:3},{1:3,2:3,3:3},{2:3,3:3,4:3},{3:3,4:3,0:3},{4:3,0:3,1:3},
];

let ID = 0;
function buildDeck(tier){
  const out=[];
  PAT[tier].forEach(pat=>{
    KEYS.forEach((color,ci)=>{
      const cost={};
      pat.c.forEach((amt,i)=>{ if(amt>0){ const k=KEYS[(ci+i)%5]; cost[k]=(cost[k]||0)+amt; } });
      out.push({id:++ID, tier, color, points:pat.p, cost});
    });
  });
  return shuffle(out);
}
function buildNobles(n){
  const pool = shuffle(NOBLE_REQS.map((r,i)=>({id:"N"+i, points:3, req:r})));
  return pool.slice(0,n);
}
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]];} return a; }

/* ---------- game state ---------- */
let G = null;
let UI = { sel:{}, selectedCard:null, phase:"play", discardResolve:null, oppView:0 };

function newPlayer(name,isAI){
  return { name, isAI, points:0, cards:[], reserved:[], nobles:[],
    tokens:{white:0,blue:0,green:0,red:0,black:0,gold:0},
    bonus:{white:0,blue:0,green:0,red:0,black:0} };
}

const AI_NAMES=["Aldo","Bianca","Cosimo"];
const LEVEL_LABEL={easy:"Easy",normal:"Normal",hard:"Hard"};
function startGame(opts, silent){
  if(typeof opts==="number") opts={mode:"ai", opponents:opts};
  opts = opts||{};
  const mode = opts.mode || SETTINGS.mode || "ai";
  let players=[], level=null;
  if(mode==="hotseat"){
    const humans = Math.min(4, Math.max(2, opts.humans || SETTINGS.humans || 2));
    for(let i=0;i<humans;i++) players.push(newPlayer(`Player ${i+1}`, false));
    SETTINGS.humans=humans;
  } else {
    const opponents = Math.min(3, Math.max(1, opts.opponents || SETTINGS.opponents || 1));
    level = opts.level || SETTINGS.aiLevel || "normal";
    players.push(newPlayer("You", false));
    for(let i=0;i<opponents;i++){ const ai=newPlayer(AI_NAMES[i], true); ai.level=level; players.push(ai); }
    SETTINGS.opponents=opponents; SETTINGS.aiLevel=level;
  }
  SETTINGS.mode=mode; saveSettings();
  const total = players.length;
  const bankPer = total<=2?4 : total===3?5 : 7;
  const bank={white:bankPer,blue:bankPer,green:bankPer,red:bankPer,black:bankPer,gold:5};
  const decks={1:buildDeck(1),2:buildDeck(2),3:buildDeck(3)};
  const board={1:[],2:[],3:[]};
  for(let t=1;t<=3;t++) for(let i=0;i<4;i++) board[t].push(decks[t].pop());
  const starter = Math.floor(Math.random()*total);
  G = { players, current:starter, starter, mode, level, bank, decks, board, nobles:buildNobles(total+1),
        finalRound:false, over:false, turn:0 };
  UI = { sel:{}, selectedCard:null, phase:"play", discardResolve:null, oppView:starter };
  if(!silent){
    if(mode==="hotseat") log(`<b>A new game begins.</b> ${total} players, pass-and-play.`);
    else log(`<b>A new game begins.</b> ${total} merchants · ${LEVEL_LABEL[level]} rivals.`);
    log(`<b>${players[starter].name}</b> ${players[starter].name==="You"?"go":"goes"} first.`);
  }
  render();
  if(!silent && !G.over && me().isAI) scheduleAI();
}

/* ---------- helpers ---------- */
const me = ()=>G.players[G.current];
const localSeat = ()=> (G && G.players[G.current] && !G.players[G.current].isAI) ? G.current : 0;
const isMyTurn = ()=> !G.over && !me().isAI && (UI.phase==="play" || UI.phase==="discard");
function totalTokens(p){ return ALL.reduce((s,k)=>s+p.tokens[k],0); }
function selCount(){ return Object.values(UI.sel).reduce((a,b)=>a+b,0); }

// payment plan for a card given a player; returns {ok, pay:{...}} using gold as wild
function affordPlan(p,card){
  const pay={white:0,blue:0,green:0,red:0,black:0,gold:0};
  let goldNeed=0;
  for(const k of KEYS){
    const need=Math.max(0,(card.cost[k]||0)-p.bonus[k]);
    const use=Math.min(need,p.tokens[k]);
    pay[k]=use;
    goldNeed += need-use;
  }
  if(goldNeed<=p.tokens.gold){ pay.gold=goldNeed; return {ok:true,pay}; }
  return {ok:false};
}
function cardDeficit(p,card){ // gems still to acquire after bonuses, tokens and gold
  let missing=0;
  for(const k of KEYS) missing+=Math.max(0,(card.cost[k]||0)-p.bonus[k]-p.tokens[k]);
  return Math.max(0,missing-p.tokens.gold);
}

/* ---------- actions ---------- */
function takeGems(p,plan){ // plan: {color:count}
  for(const k in plan){ p.tokens[k]+=plan[k]; G.bank[k]-=plan[k]; }
}
function buyCard(p,card,from){ // from: {tier} board, or {reserved:idx}
  const plan=affordPlan(p,card); if(!plan.ok) return false;
  for(const k of ALL){ if(plan.pay[k]){ p.tokens[k]-=plan.pay[k]; G.bank[k]+=plan.pay[k]; } }
  p.bonus[card.color]++; p.points+=card.points; p.cards.push(card);
  if(from.reserved!=null){ p.reserved.splice(from.reserved,1); }
  else { const arr=G.board[card.tier]; const i=arr.indexOf(card); arr[i]=G.decks[card.tier].pop()||null; }
  return true;
}
function reserveCard(p,card,from){
  if(p.reserved.length>=3) return false;
  if(from.deck){ const c=G.decks[from.deck].pop(); if(!c) return false; c.blind=true; p.reserved.push(c); card=c; }
  else { const arr=G.board[card.tier]; const i=arr.indexOf(card); card.blind=false; p.reserved.push(card); arr[i]=G.decks[card.tier].pop()||null; }
  if(G.bank.gold>0){ G.bank.gold--; p.tokens.gold++; }
  return true;
}
function qualifyingNobles(p){
  return G.nobles.filter(n=>Object.entries(n.req).every(([ci,req])=>p.bonus[KEYS[ci]]>=req));
}
function awardNoble(p,n){ const i=G.nobles.indexOf(n); if(i>=0)G.nobles.splice(i,1); p.nobles.push(n); p.points+=n.points; }

/* ---------- turn flow ---------- */
function finishTurn(p, actionText){
  log(actionText);
  const q=qualifyingNobles(p);
  const proceed=()=>{
    // enforce 10-token limit (AI auto; human handled before calling)
    if(p.points>=WIN) G.finalRound=true;
    advance();
  };
  if(q.length===0){ proceed(); return; }
  if(q.length===1 || p.isAI){ awardNoble(p,q[0]); patronFlourish(G.players.indexOf(p)); log(`<b>${p.name}</b> is visited by a patron. <b>+3</b> prestige.`); proceed(); return; }
  // human, multiple nobles -> choose
  chooseNoble(q,(n)=>{ awardNoble(p,n); patronFlourish(G.players.indexOf(p)); log(`<b>You</b> welcome a patron. <b>+3</b> prestige.`); proceed(); });
}
function advance(){
  UI.selectedCard=null; UI.sel={};
  const starter = G.starter||0;
  G.current=(G.current+1)%G.players.length;
  if(G.current===starter) G.turn++;
  // end game check: game ends when the round in which someone hit 15 completes (back to the starter)
  if(G.finalRound && G.current===starter){ endGame(); return; }
  render();
  if(!G.over && me().isAI){ scheduleAI(); }
}
function endGame(){
  G.over=true;
  let best=null;
  G.players.forEach(p=>{
    if(!best) best=p;
    else if(p.points>best.points) best=p;
    else if(p.points===best.points && p.cards.length<best.cards.length) best=p;
  });
  const rounds=G.turn||1;
  const verdict = best.name==="You" ? `<b>You win</b>` : `<b>${best.name}</b> wins`;
  log(`<span class="fin">&#9670; The books are closed after ${rounds} round${rounds===1?"":"s"}.</span>`);
  log(`<span class="fin">${verdict} with <b>${best.points}</b> prestige across <b>${best.cards.length}</b> card${best.cards.length===1?"":"s"}.</span>`);
  render();
  showWinner(best);
}

/* ---------- human interactions ---------- */
function onTakeGem(color){
  if(!humanControls()||color==="gold") return;
  const hadCard = UI.selectedCard!=null; UI.selectedCard=null;
  const cur=UI.sel[color]||0;
  const distinct=Object.keys(UI.sel).filter(k=>UI.sel[k]>0);
  const onlyThis = distinct.length===0 || (distinct.length===1 && distinct[0]===color);
  if(cur===0){
    if(distinct.some(k=>UI.sel[k]===2)) return flash("You're already taking two of one kind.");
    if(distinct.length>=3) return flash("Take at most 3 different gems.");
    if(G.bank[color]<1) return;
    UI.sel[color]=1;
  } else if(cur===1){
    // second tap: go to two-of-a-kind if the rules allow, otherwise deselect
    if(onlyThis && G.bank[color]>=4) UI.sel[color]=2;
    else delete UI.sel[color];
  } else {
    delete UI.sel[color];               // tap a doubled gem to clear it
  }
  if(hadCard){ render(); return; }
  renderBank(); renderTakeTray(); renderPlayers();
}
function onDeselect(color){
  if(!UI.sel[color]) return;
  UI.sel[color]--; if(UI.sel[color]<=0) delete UI.sel[color];
  renderBank(); renderTakeTray(); renderPlayers();
}
function confirmTake(){
  if(!humanControls()) return;
  const total=selCount(); if(total===0) return flash("Select some gems first.");
  const colors=Object.keys(UI.sel).filter(k=>UI.sel[k]>0);
  const two=colors.find(k=>UI.sel[k]===2);
  if(two && colors.length>1) return flash("Two-of-a-kind must be a single colour.");
  const p=me(); const plan={}; colors.forEach(k=>plan[k]=UI.sel[k]);
  animateTake(plan,0);
  takeGems(p,plan);
  const desc=colors.map(k=>`${UI.sel[k]}× ${NAME[k]}`).join(", ");
  UI.sel={};
  postAction(p, `<b>You</b> take ${desc}.`);
}
function clearTake(){ UI.sel={}; renderBank(); renderTakeTray(); renderPlayers(); }

function onCardClick(loc){
  if(!humanControls()) return;
  UI.selectedCard = sameLoc(UI.selectedCard,loc)?null:loc;
  UI.sel={};
  if(UI.selectedCard && UI.selectedCard.reserved!=null) document.body.classList.remove("gems-hidden");
  render();
}
function doBuy(){
  const loc=UI.selectedCard; if(!loc) return; const p=me();
  const card = loc.reserved!=null ? p.reserved[loc.reserved] : G.board[loc.tier][loc.idx];
  if(!card) return;
  const plan=affordPlan(p,card);
  if(!plan.ok) return flash("You can't afford that yet.");
  const cardEl=elCardById(card.id);
  buyCard(p,card,loc.reserved!=null?{reserved:loc.reserved}:{tier:card.tier});
  flyCard(cardEl, 0);
  if(card.points) floatText('+'+card.points+' prestige', cardEl);
  UI.selectedCard=null;
  const paid=costText(plan.pay);
  postAction(p, `<b>You</b> buy a ${NAME[card.color]} card${card.points?` (<b>+${card.points}</b>)`:""} for ${paid||"free"}.`);
}
function doReserve(){
  const loc=UI.selectedCard; if(!loc||loc.reserved!=null) return; const p=me();
  if(p.reserved.length>=3) return flash("You can hold at most 3 reserved cards.");
  const card=G.board[loc.tier][loc.idx];
  const gotGold=G.bank.gold>0;
  reserveCard(p,card,{tier:card.tier});
  UI.selectedCard=null;
  postAction(p, `<b>You</b> reserve a ${NAME[card.color]} card (tier ${ROMAN[card.tier]})${gotGold?" and take a <b>Gold</b>":""}.`);
}
function onDeckReserve(tier){
  if(!humanControls()) return; const p=me();
  if(p.reserved.length>=3) return flash("You can hold at most 3 reserved cards.");
  if(!G.decks[tier].length) return flash("That deck is empty.");
  const gotGold=G.bank.gold>0;
  reserveCard(p,null,{deck:tier});
  const card=p.reserved[p.reserved.length-1];
  UI.selectedCard=null;
  postAction(p, `<b>You</b> reserve the top card of tier ${ROMAN[tier]} (a ${NAME[card.color]} card)${gotGold?" and take a <b>Gold</b>":""}.`);
}

// after a human action: check discard, then finish turn
function postAction(p, text){
  if(totalTokens(p)>10){
    UI.phase="discard";
    render();
    flash(`Return down to 10 tokens — click yours to discard.`);
    UI.pendingText=text;
    return;
  }
  finishTurn(p,text);
}
function onDiscard(color){
  const p=me();
  if(p.tokens[color]<=0) return;
  p.tokens[color]--; G.bank[color]++;
  if(totalTokens(p)<=10){ UI.phase="play"; const t=UI.pendingText; UI.pendingText=null; finishTurn(p,t); }
  else render();
}
function humanControls(){ return !G.over && !me().isAI && UI.phase==="play"; }
function sameLoc(a,b){ if(!a||!b)return false; return a.tier===b.tier&&a.idx===b.idx&&a.reserved===b.reserved&&a.deck===b.deck; }

/* ---------- AI ---------- */
// AI pacing: a randomized pause so rivals feel like they're deliberating, not snapping.
function aiThinkTime(){ return 1200 + Math.random()*900; } // ~1.2–2.1s
function scheduleAI(){ if(G.over) return; setTimeout(aiTurn, aiThinkTime()); }
function aiTurn(){
  const p=me(); if(!p||!p.isAI||G.over) return;
  const lvl = p.level||"normal";

  // 1) buy the best affordable card (prefer points; take a useful 0-pt bonus sometimes)
  const buyables=[];
  G.board[1].concat(G.board[2],G.board[3]).forEach(c=>{ if(c && affordPlan(p,c).ok) buyables.push({c,from:{tier:c.tier}}); });
  p.reserved.forEach((c,i)=>{ if(affordPlan(p,c).ok) buyables.push({c,from:{reserved:i}}); });
  if(buyables.length){
    if(lvl==="easy"){ shuffle(buyables); buyables.sort((a,b)=> (b.c.points>0?1:0)-(a.c.points>0?1:0)); }
    else { buyables.sort((a,b)=> aiCardValue(p,b.c)-aiCardValue(p,a.c)); }
    const best=buyables[0];
    const wantBuy = lvl==="easy" ? best.c.points>0 : (best.c.points>0 || aiWants0pt(p,best.c));
    if(wantBuy){
      const bEl=elCardById(best.c.id);
      const plan=affordPlan(p,best.c);
      buyCard(p,best.c,best.from);
      flyCard(bEl, G.current);
      if(best.c.points) floatText('+'+best.c.points+' prestige', bEl);
      const paid=costText(plan.pay);
      finishTurn(p,`<b>${p.name}</b> buys a ${NAME[best.c.color]} card${best.c.points?` (<b>+${best.c.points}</b>)`:""} for ${paid||"free"}.`);
      return;
    }
  }

  // pick a target to work toward: reachable card with best value
  const targets=G.board[1].concat(G.board[2],G.board[3]).concat(p.reserved).filter(Boolean)
    .map(c=>({c,d:cardDeficit(p,c),v:aiCardValue(p,c)}))
    .filter(t=>t.d>0);
  if(lvl==="hard") targets.sort((a,b)=> ((b.v/(b.d+1)) - (a.v/(a.d+1))) || (a.d-b.d));
  else targets.sort((a,b)=> (a.d-b.d) || (b.v-a.v));
  const target = targets[0] ? targets[0].c : null;

  // 2) reserve a strong card (aggressiveness scales with difficulty)
  const resP = lvl==="hard"?0.85 : lvl==="easy"?0 : 0.5;
  if(resP>0 && p.reserved.length<3 && p.tokens.gold===0){
    const minPts = lvl==="hard"?3:4, maxDef = lvl==="hard"?8:6;
    const strong=G.board[3].concat(G.board[2]).find(c=>c && c.points>=minPts && cardDeficit(p,c)>=3 && cardDeficit(p,c)<=maxDef);
    if(strong && G.bank.gold>0 && Math.random()<resP){
      reserveCard(p,strong,{tier:strong.tier});
      // may exceed 10 -> AI discards
      aiDiscardIfNeeded(p,target);
      finishTurn(p,`<b>${p.name}</b> reserves a ${NAME[strong.color]} card (tier ${ROMAN[strong.tier]}) and takes a <b>Gold</b>.`);
      return;
    }
  }

  // 3) take gems toward the target (easy rivals grab gems less purposefully)
  const plan = (lvl==="easy" && Math.random()<0.6) ? aiRandomGems(p) : aiPickGems(p,target);
  if(Object.keys(plan).length){
    animateTake(plan, G.current);
    takeGems(p,plan);
    aiDiscardIfNeeded(p,target);
    const desc=Object.keys(plan).map(k=>`${plan[k]}× ${NAME[k]}`).join(", ");
    finishTurn(p,`<b>${p.name}</b> takes ${desc}.`);
    return;
  }

  // 4) fallback: reserve any board card for a gold, else pass
  if(p.reserved.length<3){
    const any=G.board[1].concat(G.board[2],G.board[3]).filter(Boolean)[0];
    if(any){ const gotGold=G.bank.gold>0; reserveCard(p,any,{tier:any.tier}); aiDiscardIfNeeded(p,target);
      finishTurn(p,`<b>${p.name}</b> reserves a ${NAME[any.color]} card (tier ${ROMAN[any.tier]})${gotGold?" and takes a <b>Gold</b>":""}.`); return; }
  }
  finishTurn(p,`<b>${p.name}</b> passes.`);
}
function aiCardValue(p,c){
  let v=c.points*10;
  // reward bonuses in colours we lack / that help nobles
  v += (4-Math.min(4,p.bonus[c.color]))*1.4;
  G.nobles.forEach(n=>{ if(n.req[KEYS.indexOf(c.color)]) v+=2; });
  v -= Object.values(c.cost).reduce((a,b)=>a+b,0)*0.15;
  return v;
}
function aiWants0pt(p,c){
  if(p.bonus[c.color]>=3) return false;
  // helpful if it advances a noble we're chasing, or we already have few cards
  const noble = G.nobles.some(n=>n.req[KEYS.indexOf(c.color)]);
  return noble || p.cards.length<3 || cardDeficit(p,c)===0 && p.cards.length<6;
}
function aiRandomGems(p){
  const plan={}; let taken=0;
  for(const k of shuffle(KEYS.filter(k=>G.bank[k]>0))){ if(taken>=3) break; plan[k]=1; taken++; }
  return plan;
}
function aiPickGems(p,target){
  const plan={}; let taken=0;
  const bankColors=KEYS.filter(k=>G.bank[k]>0);
  if(!bankColors.length) return plan;
  // deficits toward target (or spread if no target)
  let order;
  if(target){
    order = KEYS.map(k=>({k,d:Math.max(0,(target.cost[k]||0)-p.bonus[k]-p.tokens[k])}))
               .filter(x=>x.d>0 && G.bank[x.k]>0).sort((a,b)=>b.d-a.d);
  } else order=[];
  // two-of-a-kind if a single strong deficit and pile >=4
  if(order.length && order[0].d>=2 && G.bank[order[0].k]>=4 && order.length===1){
    plan[order[0].k]=2; return plan;
  }
  for(const x of order){ if(taken>=3) break; plan[x.k]=1; taken++; }
  // top up with any available colours if fewer than 3 chosen
  if(taken<3){
    for(const k of shuffle(bankColors)){ if(taken>=3) break; if(!plan[k]){ plan[k]=1; taken++; } }
  }
  return plan;
}
function aiDiscardIfNeeded(p){
  while(totalTokens(p)>10){
    // discard the colour we hold most of / need least; never gold first unless only gold
    let drop=null,mx=-1;
    for(const k of KEYS){ if(p.tokens[k]>mx){mx=p.tokens[k];drop=k;} }
    if(mx<=0) drop="gold";
    p.tokens[drop]--; G.bank[drop]++;
  }
}

/* ---------- rendering ---------- */
function render(){
  if(!G) return;
  renderNobles(); renderTiers(); renderBank(); renderTakeTray();
  renderBanner(); renderPlayers(); renderLog();
  const gh=document.getElementById("gemHud"), hc=document.getElementById("hudControls");
  const yourTurn = !me().isAI && !G.over;
  if(UI._lastCurrent !== G.current){ UI._lastCurrent = G.current; if(yourTurn) document.body.classList.remove("gems-hidden"); }
  if(gh) gh.classList.toggle("show", yourTurn);
  if(hc) hc.classList.toggle("hidden", !yourTurn);
  layoutPlayers();
  syncHudSpace();
  const ids=new Set();
  [1,2,3].forEach(t=>G.board[t].forEach(c=>{ if(c) ids.add(c.id); }));
  G.players[0].reserved.forEach(c=>ids.add(c.id));
  PREV_CARD_IDS=ids;
}
function gem(cls,extra=""){ return `<div class="gem g-${cls}" ${extra}></div>`; }
function dot(color,n){ return `<span class="dot" style="background:var(--${color})">${n!=null?`<span class="dv">${n}</span>`:""}</span>`; }

function renderNobles(){
  const el=document.getElementById("nobles");
  el.innerHTML=G.nobles.map(n=>{
    const chips=Object.entries(n.req).map(([ci,req])=>dot(KEYS[ci],req)).join("");
    return `<div class="noble"><div class="np">3<small>prestige</small></div><div class="req">${chips}</div></div>`;
  }).join("");
}
function renderTiers(){
  const el=document.getElementById("tiers");
  const p=G.players[0];
  el.innerHTML=[3,2,1].map(t=>{
    const dsel = sameLoc(UI.selectedCard,{deck:t});

      ? `<div class="deck-menu"><button class="mbtn res" data-action="hold-deck" data-tier="${t}" ${canRes?"":"disabled"}>Hold</button></div>` : "";

    return `<div class="tier-row">${deck}<div class="cards">${cards}</div></div>`;
  }).join("");
}
function cardHTML(c,loc){
  const p=G.players[0];
  const afford = humanControls() && affordPlan(p,c).ok;
  const sel = sameLoc(UI.selectedCard,loc);
  const cost=KEYS.filter(k=>c.cost[k]).map(k=>dot(k,c.cost[k])).join("");

    <div class="card-band g-${c.color}">${c.points?`<span class="card-pts">${c.points}</span>`:""}</div>

function renderBank(){

function renderTakeTray(){

}
function renderBanner(){
  const el=document.getElementById("goalBanner"); if(!el) return;
  const leader=G.players.reduce((a,b)=> b.points>a.points?b:a, G.players[0]);

  else if(G.finalRound){ tag=`<span class="gb-final">&#9670; Final round — last turns!</span>`; }

function syncHudSpace(){

}
function renderPlayers(){
  const el=document.getElementById("players"); if(!el) return;
  hideRtip();
  const seat = localSeat();
  const chips=G.players.map((p,i)=>{
    const hold=KEYS.map(k=>{
      const b=p.bonus[k], t=p.tokens[k];
      const sel=(i===seat && humanControls() && UI.sel[k]) ? UI.sel[k] : 0;
      const cls = sel ? "tk tk-add" : (t?"tk":"tk tk0");
      return `<span class="cg"><span class="bon g-${k}">${b?`<b>${b}</b>`:""}</span><span class="${cls}">${t+sel}</span></span>`;
    }).join("");
    const gg=p.tokens.gold;
    const gold=`<span class="cg"><span class="gem g-gold"></span><span class="tk${gg?"":" tk0"}">${gg}</span></span>`;
    const patronIco=`<svg class="pc-ico" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M3 7.5l4.2 3.4L12 4l4.8 6.9L21 7.5 19.3 19H4.7L3 7.5z"/></svg>`;
    const mine = i===seat;
    const role = mine ? "you" : "opp";
    let resStrip="";
    if(p.reserved.length){
      const selIdx = mine && UI.selectedCard && UI.selectedCard.reserved!=null ? UI.selectedCard.reserved : -1;
      const items = p.reserved.map((c,idx)=>{
        if(!mine && c.blind) return `<span class="rcard back" title="Hidden — reserved from the deck"></span>`;
        const buyable = mine && affordPlan(p,c).ok;
        const cls = `rcard g-${c.color}`+(idx===selIdx?" sel":"")+(buyable?" buyable":"");
        const attr = mine ? ` data-action="card" data-reserved="${idx}"` : "";
        const costEnc = KEYS.filter(k=>c.cost[k]).map(k=>k+":"+c.cost[k]).join(",");
        const aria = `Reserved ${NAME[c.color]}${c.points?`, ${c.points} prestige`:""}, tier ${ROMAN[c.tier]}${buyable?", ready to buy":""}`;
        return `<span class="${cls}"${attr} data-color="${c.color}" data-tier="${c.tier}" data-points="${c.points||0}" data-cost="${costEnc}" data-ready="${buyable?1:0}" aria-label="${aria}">${c.points||""}</span>`;
      }).join("");
      resStrip = `<div class="pc-res${mine?" mine":""}" title="Reserved cards">${items}</div>`;
    }
    return `<div class="pchip ${role} ${i===G.current&&!G.over?"active":""}" data-pi="${i}">
      <div class="pc-top"><span class="pc-name">${p.name}</span>${(i===G.starter&&G.turn===0&&!G.over)?`<span class="pc-first" title="Starts the game">1st</span>`:""}${(i===G.current&&!G.over&&p.isAI)?`<span class="pc-think" aria-label="thinking"><i></i><i></i><i></i></span>`:""}<span class="pc-vp"><span class="pc-pat" title="Patrons">${patronIco}${p.nobles.length}</span>${p.points}<small> VP</small></span></div>
      <div class="pc-hold">${hold}${gold}</div>${resStrip}
    </div>`;
  }).join("");
  const nav=`<button class="pchip-nav" data-action="cycle-opp" hidden aria-label="Show next player"><span class="nav-chev" aria-hidden="true">&rsaquo;</span><span class="nav-count"></span></button>`;
  el.innerHTML=chips+nav;
  if(!G.over) UI.oppView=G.current;      // keep the active player's chip in view
  layoutPlayers();
}
// Pin "You"; when the players don't fit, show one rival at a time behind a cycle button.
// Show every player when they fit; when the row is too tight, page through
// them one full-width chip at a time (including "You") behind the cycle button.
function layoutPlayers(){
  const el=document.getElementById("players"); if(!el) return;
  const nav=el.querySelector(".pchip-nav");
  const chips=[...el.querySelectorAll(".pchip")];
  el.classList.remove("paged","single");
  if(nav) nav.hidden=true;
  chips.forEach(c=>c.hidden=false);
  if(chips.length<=1) return;
  if(el.scrollWidth <= el.clientWidth + 1) return;       // everything fits: show all
  const n=chips.length;
  const view=((UI.oppView||0)%n+n)%n; UI.oppView=view;
  el.classList.add("paged","single");
  chips.forEach((c,idx)=>{ c.hidden = idx!==view; });
  if(nav){ nav.hidden=false; const c=nav.querySelector(".nav-count"); if(c) c.textContent=`${view+1}/${n}`; }
}
function cycleOpp(){
  const n=G.players.length; if(n<=1) return;
  UI.oppView=(((UI.oppView||0)+1)%n+n)%n;
  layoutPlayers();
}

const REDUCE = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
let PREV_CARD_IDS = new Set();
function fxLayer(){ return document.getElementById('fxLayer'); }
function centerOf(el){ const r=el.getBoundingClientRect(); return {x:r.left+r.width/2, y:r.top+r.height/2}; }

/* reserved-card hover tooltip */
function hideRtip(){ const t=document.getElementById('rtip'); if(t) t.hidden=true; }
function showRtip(el){
  const t=document.getElementById('rtip'); if(!t) return;
  const color=el.dataset.color, tier=el.dataset.tier, pts=+el.dataset.points||0;
  const cost=(el.dataset.cost||"").split(",").filter(Boolean)
    .map(s=>{ const[k,n]=s.split(":"); return dot(k,+n); }).join("");
  const ready = el.dataset.ready==="1";
  t.innerHTML =
    `<div class="rtip-head"><span class="rtip-swatch" style="background:var(--${color})"></span>`+
    `<span class="rtip-name">${NAME[color]}</span>`+
    (pts?`<span class="rtip-pts">${pts} <small>prestige</small></span>`:"")+`</div>`+
    `<div class="rtip-tier">Tier ${ROMAN[tier]} development</div>`+
    `<div class="rtip-cost-lbl">Cost</div>`+
    `<div class="rtip-cost">${cost||'<span class="rtip-free">Free</span>'}</div>`+
    (ready?`<div class="rtip-ready">✓ Ready to buy</div>`:"");
  t.hidden=false;
  const r=el.getBoundingClientRect(), tr=t.getBoundingClientRect();
  let left=r.left+r.width/2-tr.width/2;
  left=Math.max(6, Math.min(left, window.innerWidth-tr.width-6));
  let top=r.top-tr.height-8;
  if(top<6) top=r.bottom+8;
  t.style.left=left+'px'; t.style.top=top+'px';
}
document.addEventListener('mouseover',e=>{ const c=e.target.closest&&e.target.closest('.rcard[data-color]'); if(c) showRtip(c); });
document.addEventListener('mouseout',e=>{ const c=e.target.closest&&e.target.closest('.rcard[data-color]'); if(c) hideRtip(); });
window.addEventListener('scroll', hideRtip, true);
function flyGem(color, from, to, delay=0){
  if(REDUCE||!from||!to) return; const L=fxLayer(); if(!L) return;
  const a=centerOf(from), b=centerOf(to);
  const g=document.createElement('div');
  g.className='fly-gem g-'+color;
  g.style.left=(a.x-13)+'px'; g.style.top=(a.y-13)+'px'; g.style.transitionDelay=delay+'ms';
  L.appendChild(g);
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    g.style.transform=`translate(${b.x-a.x}px, ${b.y-a.y}px) scale(.45)`; g.style.opacity='0.15';
  }));
  setTimeout(()=>g.remove(), 750+delay);
}
function flyCard(fromEl, toIndex, delay=0){
  if(REDUCE||!fromEl) return; const L=fxLayer(); if(!L) return;
  const toEl=elPlayer(toIndex); if(!toEl) return;
  const r=fromEl.getBoundingClientRect(); if(!r.width) return;
  const b=centerOf(toEl);
  const ghost=fromEl.cloneNode(true);
  ghost.querySelectorAll('.menu').forEach(n=>n.remove());
  ghost.classList.remove('sel','afford','card-enter');
  ghost.classList.add('fly-card');
  Object.assign(ghost.style,{left:r.left+'px', top:r.top+'px', width:r.width+'px', height:r.height+'px', transitionDelay:delay+'ms'});
  L.appendChild(ghost);
  const dx=b.x-(r.left+r.width/2), dy=b.y-(r.top+r.height/2);
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    ghost.style.transform=`translate(${dx}px, ${dy}px) scale(.16) rotate(-6deg)`;
    ghost.style.opacity='0';
  }));
  setTimeout(()=>{ ghost.remove(); const t=elPlayer(toIndex); if(t) ringPop(t); }, 560+delay);
}
function floatText(text, atEl, delay=0){
  if(REDUCE||!atEl) return; const L=fxLayer(); if(!L) return;
  const c=centerOf(atEl);
  const t=document.createElement('div');
  t.className='float-txt'; t.textContent=text;
  t.style.left=c.x+'px'; t.style.top=c.y+'px'; t.style.transform='translate(-50%,-50%)'; t.style.transitionDelay=delay+'ms';
  L.appendChild(t);
  requestAnimationFrame(()=>requestAnimationFrame(()=>{ t.style.transform='translate(-50%,-165%)'; t.style.opacity='0'; }));
  setTimeout(()=>t.remove(), 1150+delay);
}
function ringPop(atEl){
  if(REDUCE||!atEl) return; const L=fxLayer(); if(!L) return;
  const c=centerOf(atEl);
  const r=document.createElement('div');
  r.className='fx-ring';
  r.style.left=(c.x-20)+'px'; r.style.top=(c.y-20)+'px'; r.style.opacity='0.9';
  L.appendChild(r);
  requestAnimationFrame(()=>requestAnimationFrame(()=>{ r.style.transform='scale(2.6)'; r.style.opacity='0'; }));
  setTimeout(()=>r.remove(), 760);
}
function animateTake(plan, playerIndex){
  if(REDUCE) return; const to=elPlayer(playerIndex); if(!to) return;
  let d=0;
  Object.keys(plan).forEach(k=>{
    const from=elBank(k); if(!from) return;
    for(let n=0;n<plan[k];n++){ flyGem(k, from, to, d); d+=90; }
  });
}
function patronFlourish(playerIndex){ const el=elPlayer(playerIndex); ringPop(el); floatText('Patron +3', el); }
function celebrate(){
  if(REDUCE) return; const L=fxLayer(); if(!L) return;
  const cols=['white','blue','green','red','black','gold'];
  for(let i=0;i<40;i++){
    const c=document.createElement('div');
    c.className='confetti g-'+cols[i%cols.length];
    c.style.left=Math.random()*100+'vw';
    c.style.setProperty('--spin',(Math.random()*720-360)+'deg');
    const dur=2.2+Math.random()*1.8;
    c.style.animation=`conffall ${dur}s ${Math.random()*0.6}s ease-in forwards`;
    L.appendChild(c);
    setTimeout(()=>c.remove(), (dur+1)*1000);
  }
}

/* ---------- event delegation ---------- */
document.addEventListener("click",(e)=>{
  const t=e.target.closest("[data-action]"); if(!t) return;
  const a=t.dataset.action;
  switch(a){
    case "open-tutorial": openTutorial(); break;
    case "open-newgame": openNewGame(); break;
    case "close-modal": closeModal(); if(pendingStartMenu){ pendingStartMenu=false; openNewGame(true); } break;
    case "ng-mode": SETTINGS.mode=t.dataset.mode; saveSettings(); ngRerender(); break;
    case "ng-ai-count": SETTINGS.opponents=+t.dataset.v; saveSettings(); ngRerender(); break;
    case "ng-ai-level": SETTINGS.aiLevel=t.dataset.v; saveSettings(); ngRerender(); break;
    case "ng-players": SETTINGS.humans=+t.dataset.v; saveSettings(); ngRerender(); break;
    case "start-game": startFromMenu(); break;
    case "bank": onTakeGem(t.dataset.color); break;
    case "deselect": onDeselect(t.dataset.color); break;
    case "confirm-take": confirmTake(); break;
    case "clear-take": clearTake(); break;
    case "clear-sel": UI.selectedCard=null; render(); break;
    case "card": {
      const loc = t.dataset.reserved!=null ? {reserved:+t.dataset.reserved}
                : {tier:+t.dataset.tier, idx:+t.dataset.idx};
      onCardClick(loc); break;
    }
    case "buy": e.stopPropagation(); doBuy(); break;
    case "reserve": e.stopPropagation(); doReserve(); break;
    case "deck": onCardClick({deck:+t.dataset.tier}); break;
    case "hold-deck": e.stopPropagation(); onDeckReserve(+t.dataset.tier); break;
    case "discard": onDiscard(t.dataset.color); break;
    case "pick-noble": { const n=UI._nobleList[+t.dataset.i]; closeModal(); UI._nobleCb(n); break; }
    case "toggle-ledger": toggleLedger(); break;
    case "close-ledger": closeLedger(); break;
    case "cycle-opp": cycleOpp(); break;
    case "toggle-hud": document.body.classList.toggle("gems-hidden"); break;
    case "open-menu": openMenu(); break;
    case "open-settings": openSettings(false); break;
    case "settings-from-menu": openSettings(true); break;
    case "save-game": saveGame(); break;
    case "load-game": loadGame(); break;
    case "toggle-theme": toggleTheme(); break;
    case "set-max": setMax(t.dataset.v); break;
    case "set-cvd": setCVD(t.dataset.v); break;
  }
});
scrim.addEventListener("click",(e)=>{ if(e.target===scrim && scrim.dataset.dismiss==="1") closeModal(); });
window.addEventListener("resize", ()=>{ syncHudSpace(); layoutHeader(); if(G) layoutPlayers(); });

/* ---------- ledger drawer ---------- */
function toggleLedger(){
  const d=document.getElementById('ledgerDrawer');
  const open=d.classList.toggle('open');
  document.body.classList.toggle('ledger-open', open);
  d.querySelector('.ledger-tab').setAttribute('aria-expanded', open?'true':'false');
}
function closeLedger(){
  const d=document.getElementById('ledgerDrawer');
  d.classList.remove('open'); document.body.classList.remove('ledger-open');
  d.querySelector('.ledger-tab').setAttribute('aria-expanded','false');
}

/* ---------- boot ---------- */
// remember, per device, that the how-to has been shown (survives refresh; degrades safely if storage is blocked)
function seenTutorial(){ try{ return localStorage.getItem('gilded_tutorial_seen')==='1'; }catch(e){ return false; } }
function markTutorialSeen(){ try{ localStorage.setItem('gilded_tutorial_seen','1'); }catch(e){} }

applySettings();
startGame(SETTINGS.mode==="hotseat"
  ? {mode:"hotseat", humans:SETTINGS.humans||2}
  : {mode:"ai", opponents:SETTINGS.opponents||1, level:SETTINGS.aiLevel||"normal"}, true);
syncHeaderActions();
if(!seenTutorial()){ markTutorialSeen(); pendingStartMenu=true; openTutorial(); }
else openNewGame(true);
</script>
</body>
