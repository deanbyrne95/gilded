<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Gilded — a gem merchant game</title>
<link rel="icon" type="image/svg+xml" href="assets/images/coin.svg">
<link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="assets/images/favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="assets/images/apple-touch-icon.png">
<link rel="manifest" href="assets/site.webmanifest">
<meta name="theme-color" content="#17131d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gilded">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,600&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="pre-game">
<div class="wrap">
  <div class="topbar">
    <div class="brand">
      <h1>Gilded</h1>
      <span class="sub">A Gem Merchant's Game</span>
    </div>
    <div class="spacer"></div>
    <button class="gbtn theme-toggle" id="themeToggle" data-action="toggle-theme" aria-label="Toggle light or dark theme" aria-pressed="false"></button>
    <button class="gbtn menu-btn" id="menuBtn" data-action="open-menu" aria-haspopup="dialog">&#9776; Menu</button>
  </div>

  <div class="goal-banner" id="goalBanner"></div>

  <div class="board">
    <div class="section-label">Patrons</div>
    <div class="nobles" id="nobles"></div>

    <div class="section-label">Development cards</div>
    <div id="tiers"></div>
  </div>
</div>

<!-- Ledger: floating HUD panel, slides in from the right (no overlay) -->
<aside class="ledger-drawer" id="ledgerDrawer">
  <button class="ledger-tab" data-action="toggle-ledger" aria-expanded="false" aria-label="Open or close ledger"><span class="lbl">Ledger</span><span class="chev" aria-hidden="true">&#9662;</span></button>
  <div class="ledger-head">
    <h3>Ledger</h3>
    <button class="ledger-close" data-action="close-ledger" aria-label="Close ledger">&times;</button>
  </div>
  <div class="log" id="log"></div>
</aside>

<!-- Floating player HUD -->
<div class="hud" id="hud">
  <div class="hud-players" id="players"></div>
</div>

<!-- Gem bank + take controls: own centered panel, tucked behind the HUD, shown on your turn -->
<div class="gem-hud" id="gemHud">
  <button class="gem-tab" data-action="toggle-hud" aria-label="Hide or show the bank" title="Hide / show the bank"><span class="lbl">The Bank</span><span class="chev" aria-hidden="true">&#9662;</span></button>
  <div class="hud-controls" id="hudControls"><div class="take-tray" id="takeTray"></div></div>
  <div class="bank" id="bank"></div>
</div>

<div id="fxLayer"></div>
<div id="rtip" class="rtip" hidden></div>
<div id="toasts" class="toasts pos-br" aria-live="polite"></div>

<!-- Tutorial / dialogs -->
<div class="scrim" id="scrim">
  <div class="modal" id="modal"></div>
</div>

<script src="assets/js/constants.js"></script>
<script src="assets/js/game.js"></script>
<script src="assets/js/interactions.js"></script>
<script src="assets/js/ai.js"></script>
<script src="assets/js/render.js"></script>
<script src="assets/js/ui.js"></script>
<script src="assets/audio/lord-of-the-land.js"></script>
<script src="assets/js/audio.js"></script>
<script src="assets/js/animations.js"></script>
<script src="assets/js/events.js"></script>
</body>
</html>
